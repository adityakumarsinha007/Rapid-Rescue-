<!DOCTYPE html>
<html>
<head>
  <title>Driver Mode</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="driver.css">
</head>

<body>

<div class="navbar">
  <div class="logo">RAPID<span>RESCUE</span></div>

  <div class="nav-links">
    <a href="../index.html">Home</a>
    <a class="active">Driver Mode</a>
    <a href="../rescue/rescue.html">Rescue Dashboard</a>
  </div>
</div>

<div class="container">

  <!-- LEFT CARD -->
  <div class="card">

    <label>DRIVER NAME</label>
    <input id="name" placeholder="Enter your full name">

    <label>VEHICLE TYPE</label>
    <select id="vehicleType" onchange="updateVehicle(); loadVehicleModels();">
      <option value="">Select Vehicle Type</option>
      <option value="car">🚗 Car</option>
      <option value="bike">🏍️ Bike</option>
      <option value="scooter">🛵 Scooter</option>
      <option value="truck">🚚 Truck</option>
      <option value="bus">🚌 Bus</option>
      <option value="taxi">🚖 Taxi</option>
      <option value="auto">🛺 Auto Rickshaw</option>
      <option value="sports">🏎️ Sports Car</option>
      <option value="ambulance">🚑 Ambulance</option>
      <option value="van">🚐 Van</option>
      <option value="pickup">🛻 Pickup</option>
    </select>

    <label>VEHICLE MODEL</label>
    <select id="vehicleModel">
      <option value="">Select Vehicle Model</option>
    </select>

    <label>VEHICLE NUMBER</label>
    <input id="vehicleNo" placeholder="e.g. KA-01-AB-1234">

    <label>EMERGENCY CONTACT NUMBER</label>

    <div class="row">
      <select id="emCode" class="country">
              

        <option value="+91">🇮🇳 +91 India</option>
        <option value="+1">🇺🇸 +1 USA</option>
        <option value="+44">🇬🇧 +44 UK</option>
        <option value="+1">🇨🇦 +1 Canada</option>
        <option value="+61">🇦🇺 +61 Australia</option>
        <option value="+49">🇩🇪 +49 Germany</option>
        <option value="+33">🇫🇷 +33 France</option>
        <option value="+39">🇮🇹 +39 Italy</option>
        <option value="+34">🇪🇸 +34 Spain</option>
        <option value="+31">🇳🇱 +31 Netherlands</option>

        <option value="+41">🇨🇭 +41 Switzerland</option>
        <option value="+46">🇸🇪 +46 Sweden</option>
        <option value="+47">🇳🇴 +47 Norway</option>
        <option value="+45">🇩🇰 +45 Denmark</option>
        <option value="+358">🇫🇮 +358 Finland</option>
        <option value="+48">🇵🇱 +48 Poland</option>
        <option value="+43">🇦🇹 +43 Austria</option>
        <option value="+32">🇧🇪 +32 Belgium</option>
        <option value="+353">🇮🇪 +353 Ireland</option>
        <option value="+351">🇵🇹 +351 Portugal</option>

        <option value="+7">🇷🇺 +7 Russia</option>
        <option value="+380">🇺🇦 +380 Ukraine</option>
        <option value="+90">🇹🇷 +90 Turkey</option>
        <option value="+966">🇸🇦 +966 Saudi Arabia</option>
        <option value="+971">🇦🇪 +971 UAE</option>
        <option value="+974">🇶🇦 +974 Qatar</option>
        <option value="+965">🇰🇼 +965 Kuwait</option>
        <option value="+968">🇴🇲 +968 Oman</option>
        <option value="+973">🇧🇭 +973 Bahrain</option>
        <option value="+20">🇪🇬 +20 Egypt</option>

        <option value="+27">🇿🇦 +27 South Africa</option>
        <option value="+254">🇰🇪 +254 Kenya</option>
        <option value="+234">🇳🇬 +234 Nigeria</option>
        <option value="+251">🇪🇹 +251 Ethiopia</option>
        <option value="+212">🇲🇦 +212 Morocco</option>
        <option value="+81">🇯🇵 +81 Japan</option>
        <option value="+82">🇰🇷 +82 South Korea</option>
        <option value="+86">🇨🇳 +86 China</option>
        <option value="+852">🇭🇰 +852 Hong Kong</option>
        <option value="+886">🇹🇼 +886 Taiwan</option>

        <option value="+65">🇸🇬 +65 Singapore</option>
        <option value="+60">🇲🇾 +60 Malaysia</option>
        <option value="+66">🇹🇭 +66 Thailand</option>
        <option value="+84">🇻🇳 +84 Vietnam</option>
        <option value="+62">🇮🇩 +62 Indonesia</option>
        <option value="+63">🇵🇭 +63 Philippines</option>
        <option value="+95">🇲🇲 +95 Myanmar</option>
        <option value="+977">🇳🇵 +977 Nepal</option>
        <option value="+880">🇧🇩 +880 Bangladesh</option>
        <option value="+94">🇱🇰 +94 Sri Lanka</option>

        
        <option value="+93">🇦🇫 +93 Afghanistan</option>
        <option value="+55">🇧🇷 +55 Brazil</option>
        <option value="+54">🇦🇷 +54 Argentina</option>
        <option value="+56">🇨🇱 +56 Chile</option>
        <option value="+57">🇨🇴 +57 Colombia</option>
        <option value="+52">🇲🇽 +52 Mexico</option>
        <option value="+51">🇵🇪 +51 Peru</option>
        <option value="+58">🇻🇪 +58 Venezuela</option>
        <option value="+64">🇳🇿 +64 New Zealand</option>

        
      </select>

      <input id="emergency" placeholder="Phone number">
    </div>

    <div class="row">
      <button class="save" onclick="saveDetails()">💾 Save</button>
      <button class="alert" onclick="clearDetails()">🗑 Clear</button>
    </div>

    <!-- CHANGED ONLY THIS ROW -->
    <div class="row">
      <button class="connect" onclick="connectESP32()">🔵 Connect Vehicle</button>
      <button class="save" onclick="startTrip()">🚀 Start Trip</button>
    </div>

    <p style="color:#ff4b5c;font-size:12px;">
      ⚠️ Accident detection is automatic via vehicle sensor
    </p>

  </div>

  <!-- RIGHT CARD -->
  <div class="card vehicle-card">

    <div class="vehicle-container">

      <div id="roadTree" class="road-tree">🌳</div>

      <div id="birdFlock" class="bird-flock">
        <span class="bird">🦅</span><span class="bird">🦅</span>
        <span class="bird">🦅</span><span class="bird">🦅</span>
        <span class="bird">🦅</span><span class="bird">🦅</span>
        <span class="bird">🦅</span>
        <span class="bird">🦅</span>
      </div>

      <div id="vehicle" style="display:none;"></div>

      <div id="comicPopup" class="comic-popup">
        Demo Vehicle Ready 🚀
      </div>

    </div>

    <div class="status-box">

      <label style="margin-top:0;">VEHICLE IMAGE</label>

      <input
        type="file"
        id="vehicleImage"
        accept=".jpg,.jpeg,.png,image/jpeg,image/png"
        onchange="previewVehicleImage(event)"
      >

      <img
        id="vehiclePreview"
        class="vehicle-preview"
        style="display:none;"
      >

      <p style="font-size:11px;color:#888;margin-top:8px;">
        JPG / JPEG / PNG • Max 5MB
      </p>

      <p id="status">Status: Waiting...</p>
      <p><b>Latitude:</b> <span id="lat">-</span></p>
      <p><b>Longitude:</b> <span id="lng">-</span></p>
      <p><b>Speed:</b> <span id="spd">-</span></p>
      <p><b>Impact:</b> <span id="impactLevel">-</span></p>

    </div>

    <div class="road"></div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="../firebase/firebase-config.js"></script>
<script src="driver.js"></script>

</body>
</html>
