<!DOCTYPE html>
<html>
<head>
  <title>Driver Mode</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="driver.css">
</head>

<body>

<div class="navbar">
  <div class="logo">RAPID<span>RESCUE</span></div>

  <div class="nav-links">
    <a href="../index.html">Home</a>
    <a class="active">Driver Mode</a>
    <a href="../rescue/rescue.html">Rescue Dashboard</a>
  </div>
</div>

<div class="container">
  <div class="card">

    <label>DRIVER NAME</label>
    <input id="name" placeholder="Enter your full name">

    <label>VEHICLE MODEL</label>
    <input id="vehicleModel" placeholder="e.g. Toyota Camry">

    <label>VEHICLE NUMBER</label>
    <input id="vehicleNo" placeholder="e.g. KA-01-AB-1234">

    <label>EMERGENCY CONTACT NUMBER</label>
    <div class="row">
      <select id="emCode" class="country">
        <option value="+91">🇮🇳 +91</option>
        <option value="+1">🇺🇸 +1</option>
        <option value="+44">🇬🇧 +44</option>
      </select>
      <input id="emergency" placeholder="Phone number">
    </div>

    <label>VEHICLE TYPE</label>
    <select id="vehicleType">
      <option value="">Select Vehicle Type</option>
      <option>🚗 Car</option>
      <option>🏍️ Bike</option>
      <option>🛵 Scooter</option>
      <option>🚚 Truck</option>
      <option>🚌 Bus</option>
      <option>🚖 Taxi</option>
      <option>🛺 Auto Rickshaw</option>
      <option>🏎️ Sports Car</option>
      <option>🚑 Ambulance</option>
      <option>🚐 Van</option>
      <option>🛻 Pickup</option>
    </select>

    <!-- 🔥 NEW BUTTON ROW -->
    <div class="row">
      <button class="save" onclick="saveDetails()">💾 Save</button>
      <button class="alert" onclick="clearDetails()">🗑 Clear</button>
    </div>
<div class="row">
    <!-- EXISTING BUTTONS -->
    <button class="save" onclick="startTrip()">🚀 Start Trip</button>
    <button class="connect" onclick="connectESP32()">🔵 Connect Vehicle</button>
</div>
    <p style="color:#ff4b5c; font-size:12px;">
      ⚠️ Accident detection is automatic via vehicle sensor
    </p>

    <p id="status">Status: Waiting...</p>

    <p><b>Latitude:</b> <span id="lat">-</span></p>
    <p><b>Longitude:</b> <span id="lng">-</span></p>
    <p><b>Speed:</b> <span id="spd">-</span></p>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="../firebase/firebase-config.js"></script>
<script src="driver.js"></script>

</body>
</html>
