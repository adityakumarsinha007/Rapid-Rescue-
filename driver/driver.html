<!DOCTYPE html>
<html>
<head>
  <title>Driver Mode</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="driver.css">
</head>

<body>

<div class="navbar">
  <div class="logo">RAPID<span>RESCUE</span></div>

  <div class="nav-links">
    <a href="../index.html">Home</a>
    <a class="active">Driver Mode</a>
    <a href="../rescue/rescue.html">Rescue Dashboard</a>
  </div>
</div>

<div class="container">

  <!-- LEFT CARD -->
  <div class="card">

    <label>DRIVER NAME</label>
    <input id="name" placeholder="Enter your full name">

    <label>VEHICLE TYPE</label>
    <select id="vehicleType" onchange="updateVehicle(); loadVehicleModels();">
      <option value="">Select Vehicle Type</option>
      <option value="car">🚗 Car</option>
      <option value="bike">🏍️ Bike</option>
      <option value="scooter">🛵 Scooter</option>
      <option value="truck">🚚 Truck</option>
      <option value="bus">🚌 Bus</option>
      <option value="taxi">🚖 Taxi</option>
      <option value="auto">🛺 Auto Rickshaw</option>
      <option value="sports">🏎️ Sports Car</option>
      <option value="ambulance">🚑 Ambulance</option>
      <option value="van">🚐 Van</option>
      <option value="pickup">🛻 Pickup</option>
    </select>

    <label>VEHICLE MODEL</label>
    <select id="vehicleModel">
      <option value="">Select Vehicle Model</option>
    </select>

    <label>VEHICLE NUMBER</label>
    <input id="vehicleNo" placeholder="e.g. KA-01-AB-1234">

    <label>EMERGENCY CONTACT NUMBER</label>

    <div class="row">
      <select id="emCode" class="country">
        <option value="+91">🇮🇳 +91</option>
        <option value="+1">🇺🇸 +1</option>
        <option value="+44">🇬🇧 +44</option>
      </select>

      <input id="emergency" placeholder="Phone number">
    </div>

    <div class="row">
      <button class="save" onclick="saveDetails()">💾 Save</button>
      <button class="alert" onclick="clearDetails()">🗑 Clear</button>
    </div>

    <div class="row">
      <button class="save" onclick="startTrip()">🚀 Start Trip</button>
      <button class="connect" onclick="connectESP32()">🔵 Connect Vehicle</button>
    </div>

    <p style="color:#ff4b5c;font-size:12px;">
      ⚠️ Accident detection is automatic via vehicle sensor
    </p>

  </div>

  <!-- RIGHT CARD -->
  <div class="card vehicle-card">

    <div class="vehicle-container">

      <!-- TREE -->
      <div id="roadTree" class="road-tree">🌳</div>

      <!-- EAGLE BIRDS -->
      <div id="birdFlock" class="bird-flock">
        <span class="bird">🦅</span><span class="bird">🦅</span>
        <span class="bird">🦅</span><span class="bird">🦅</span>
        <span class="bird">🦅</span><span class="bird">🦅</span>
        <span class="bird">🦅</span>
        <span class="bird">🦅</span>
        
      </div>

      <!-- VEHICLE -->
      <div id="vehicle" style="display:none;"></div>

      <!-- POPUP -->
      <div id="comicPopup" class="comic-popup">
        Demo Vehicle Ready 🚀
      </div>

    </div>

    <div class="status-box">

      <label style="margin-top:0;">VEHICLE IMAGE</label>

      <input
        type="file"
        id="vehicleImage"
        accept=".jpg,.jpeg,.png,image/jpeg,image/png"
        onchange="previewVehicleImage(event)"
      >

      <img
        id="vehiclePreview"
        class="vehicle-preview"
        style="display:none;"
      >

      <p style="font-size:11px;color:#888;margin-top:8px;">
        JPG / JPEG / PNG • Max 5MB
      </p>

      <p id="status">Status: Waiting...</p>
      <p><b>Latitude:</b> <span id="lat">-</span></p>
      <p><b>Longitude:</b> <span id="lng">-</span></p>
      <p><b>Speed:</b> <span id="spd">-</span></p>
      <p><b>Impact:</b> <span id="impactLevel">-</span></p>

    </div>

    <div class="road"></div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="../firebase/firebase-config.js"></script>
<script src="driver.js"></script>

</body>
</html>
