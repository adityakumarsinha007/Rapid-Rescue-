<!DOCTYPE html>
<html>
<head>
  <title>Rescue Command</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="rescue.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

<!-- 🚨 FULL SCREEN OVERLAY -->
<div id="accidentOverlay" class="accident-overlay">
  <span>ACCIDENT DETECTED</span>
</div>

<!-- 🔥 HEADER -->
<div class="header">

  <h2>🚑 Rescue Command Center</h2>

  <div class="header-right">
    <span class="status">🟢 LIVE SYSTEM ACTIVE</span>

    <!-- 🔊 SOUND BUTTON -->
    <button id="soundBtn" class="sound-btn" onclick="toggleSound()">
      🔊 ON
    </button>
  </div>

</div>

<div class="main">

  <!-- 🔥 SIDEBAR -->
  <div class="sidebar">

    <h3>🚨 EMERGENCY FEED</h3>

    <div class="feed-card">

      <div class="top">
        <span class="critical">CRITICAL</span>
        <span class="live">REAL-TIME</span>
      </div>

      <div class="section">
        <h2 id="dVehicleNo">-</h2>
        <p class="vehicle" id="dVehicleType">-</p>
      </div>

      <div class="section">
        <p class="label">Driver</p>
        <p class="driver" id="dName">-</p>
      </div>

      <div class="section">
        <p class="label">Contact</p>
        <p class="phone">📞 <span id="dPhone">-</span></p>
        <p class="phone">🚨 <span id="dEmergency">-</span></p>
      </div>

      <div class="section">
        <p class="label">Vehicle Model</p>
        <p id="dVehicleModel">-</p>
      </div>

      <div class="section">
        <p class="label">Location</p>
        <p class="gps">📍 <span id="dLat">-</span>, <span id="dLng">-</span></p>
      </div>

      <div class="section">
        <p class="label">Speed</p>
        <p id="dSpeed">-</p>
      </div>

      <div class="section">
        <p class="label">Impact Level</p>
        <p id="dImpact">-</p>
      </div>

      <div class="section">
        <p class="label">Required Equipment</p>
        <p id="dEquipment">-</p>
      </div>

    </div>

  </div>

  <!-- 🔥 RIGHT PANEL -->
  <div class="right-panel">

    <!-- 📊 ANALYTICS PANEL -->
    <div class="analytics-bar">

      <div class="analytic-card">
        <p class="analytic-label">TOTAL ALERTS</p>
        <h2 id="aTotal">0</h2>
      </div>

      <div class="analytic-card">
        <p class="analytic-label">HIGH IMPACT</p>
        <h2 id="aHigh">0</h2>
      </div>

      <div class="analytic-card">
        <p class="analytic-label">AVG RESPONSE</p>
        <h2 id="aAvg">4 min</h2>
      </div>

    </div>

    <!-- 🗺️ MAP -->
    <div id="map"></div>

  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="../firebase/firebase-config.js"></script>
<script src="rescue.js"></script>

</body>
</html>
